.input-field .field-label { font-size: var(--font-size-body); font-weight: var(--font-weight-body); color: var(--color-on-surface); }
.input-field input, .input-field textarea { height: var(--size-button-md); background: var(--color-card); border: 1.5px solid var(--color-border); border-radius: var(--radius-lg); padding: 0 var(--space-3); font-size: var(--font-size-body); font-family: var(--font-body); color: var(--color-on-surface); outline: none; transition: border-color .15s; width: 100%; }
.input-field input::placeholder, .input-field textarea::placeholder { color: var(--color-muted-foreground); }
.input-field input:focus, .input-field textarea:focus { border-color: var(--color-primary); }
.input-field input:disabled, .input-field textarea:disabled { opacity: .5; background: var(--surface-dim); }
.input-field textarea { height: auto; min-height: 100px; padding: var(--space-3); resize: vertical; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-foreground: var(--primary-foreground);
  }
  @layer base {
    body { background: var(--primary-background); color: var(--primary-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased" style="background: var(--background); color: var(--foreground);">

    <!-- Status Bar -->
    <div class="status-bar" style="height: 44px; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; font-size: var(--font-size-caption); font-weight: 600; color: var(--color-on-surface); background: var(--background); flex-shrink: 0;">
      <span>9:41</span>
      <div style="display: flex; align-items: center; gap: 6px;">
        <i data-lucide="signal" style="width: 14px; height: 14px;"></i>
        <i data-lucide="wifi" style="width: 14px; height: 14px;"></i>
        <i data-lucide="battery-full" style="width: 14px; height: 14px;"></i>
      </div>
    </div>

    <!-- Page Content Area -->
    <main style="flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch;">

      <!-- Header -->
      <div style="padding: var(--space-4) var(--space-5) var(--space-3); background: var(--background); flex-shrink: 0;">
        <div style="display: flex; align-items: center; justify-content: space-between;">
          <div>
            <h1 style="font-family: var(--font-heading); font-size: var(--font-size-h3); font-weight: var(--font-weight-h3); color: var(--color-on-surface); text-wrap: balance; word-break: keep-all; overflow-wrap: break-word;">今日美食</h1>
            <p style="font-size: var(--font-size-caption); color: var(--color-on-surface-variant); margin-top: 2px;">记录每一顿温暖</p>
          </div>
          <div data-component="avatar" class="avatar avatar-md avatar-profile" style="background: var(--primary-100);">
            <span class="avatar-initials" style="color: var(--primary-700);">味</span>
          </div>
        </div>
      </div>

      <!-- Search Bar -->
      <div style="padding: 0 var(--space-5) var(--space-3);">
        <div data-component="input" class="input-search">
          <span class="ico"><i data-lucide="search" style="width: 20px; height: 20px;"></i></span>
          <input type="text" placeholder="搜索菜谱或食材" readonly />
          <span class="ico"><i data-lucide="mic" style="width: 20px; height: 20px;"></i></span>
        </div>
      </div>

      <!-- Chip Filters -->
      <div style="display: flex; gap: var(--space-2); padding: var(--space-2) var(--space-5); overflow-x: auto; flex-shrink: 0;" class="no-scrollbar">
        <span class="chip filled">家的味道</span>
        <span class="chip filled">节日美食</span>
        <span class="chip filled">下厨日记</span>
        <span class="chip outline">工作日午餐</span>
        <span class="chip outline">健康轻食</span>
      </div>

      <!-- Checkin Card -->
      <div style="background: var(--color-card); border-radius: var(--radius-xl); padding: var(--space-4); margin: 0 var(--space-5) var(--space-3); box-shadow: var(--shadow-1);">
        <div style="display: flex; align-items: center; justify-content: space-between;">
          <div>
            <div style="font-weight: 600; font-size: var(--font-size-body); color: var(--color-on-surface);">连续打卡</div>
            <div style="font-size: var(--font-size-caption); color: var(--color-on-surface-variant); margin-top: 2px;">已坚持 5 天</div>
          </div>
          <button data-component="button" class="btn btn-primary btn-sm">今日打卡</button>
        </div>
        <div style="display: flex; gap: var(--space-1); margin-top: var(--space-3);">
          <div style="width: 32px; height: 32px; border-radius: var(--radius-full); display: flex; align-items: center; justify-content: center; font-size: var(--font-size-caption); font-weight: 500; background: var(--color-primary); color: var(--color-on-primary);">一</div>
          <div style="width: 32px; height: 32px; border-radius: var(--radius-full); display: flex; align-items: center; justify-content: center; font-size: var(--font-size-caption); font-weight: 500; background: var(--color-primary); color: var(--color-on-primary);">二</div>
          <div style="width: 32px; height: 32px; border-radius: var(--radius-full); display: flex; align-items: center; justify-content: center; font-size: var(--font-size-caption); font-weight: 500; background: var(--color-primary); color: var(--color-on-primary);">三</div>
          <div style="width: 32px; height: 32px; border-radius: var(--radius-full); display: flex; align-items: center; justify-content: center; font-size: var(--font-size-caption); font-weight: 500; background: var(--color-primary); color: var(--color-on-primary);">四</div>
          <div style="width: 32px; height: 32px; border-radius: var(--radius-full); display: flex; align-items: center; justify-content: center; font-size: var(--font-size-caption); font-weight: 500; background: var(--color-primary); color: var(--color-on-primary);">五</div>
          <div style="width: 32px; height: 32px; border-radius: var(--radius-full); display: flex; align-items: center; justify-content: center; font-size: var(--font-size-caption); font-weight: 500; background: var(--color-primary-container); color: var(--color-on-primary-container); border: 1.5px solid var(--color-primary);">六</div>
          <div style="width: 32px; height: 32px; border-radius: var(--radius-full); display: flex; align-items: center; justify-content: center; font-size: var(--font-size-caption); font-weight: 500; background: var(--color-surface-container-high); color: var(--color-on-surface-variant);">日</div>
        </div>
      </div>

      <!-- Section Title: 美食日记 -->
      <div style="font-family: var(--font-heading); font-size: var(--font-size-h4); font-weight: var(--font-weight-h4); color: var(--color-on-surface); padding: var(--space-4) var(--space-5) var(--space-2);">美食日记</div>

      <!-- Food Diary Cards -->
      <div style="padding: 0 var(--space-5) var(--space-4); display: flex; flex-direction: column; gap: var(--space-3);">

        <!-- Card 1: 红烧肉 -->
        <div data-component="card" class="food-card food-card--h food-card--diary" style="width: 100%;">
          <img class="card-img" src="../assets/food-hongshaorou.jpg" alt="红烧肉" style="width: 96px; height: 96px; flex-shrink: 0; object-fit: cover; border-radius: var(--radius-lg);" />
          <div class="card-body">
            <div class="card-title">红烧肉</div>
            <span class="stars">
              <i data-lucide="star" class="star" style="width: 14px; height: 14px; fill: var(--accent);"></i>
              <i data-lucide="star" class="star" style="width: 14px; height: 14px; fill: var(--accent);"></i>
              <i data-lucide="star" class="star" style="width: 14px; height: 14px; fill: var(--accent);"></i>
              <i data-lucide="star" class="star" style="width: 14px; height: 14px; fill: var(--accent);"></i>
              <i data-lucide="star" class="star" style="width: 14px; height: 14px; fill: var(--accent);"></i>
              <span class="rating-num" style="margin-left: 4px;">5.0</span>
            </span>
            <div class="card-tags">
              <span class="chip accent">午餐</span>
              <span class="chip filled">家的味道</span>
            </div>
            <div class="card-time">今天 12:30</div>
          </div>
        </div>

        <!-- Card 2: 番茄鸡蛋面 -->
        <div data-component="card" class="food-card food-card--h food-card--diary" style="width: 100%;">
          <img class="card-img" src="../assets/food-tomato-noodle.jpg" alt="番茄鸡蛋面" style="width: 96px; height: 96px; flex-shrink: 0; object-fit: cover; border-radius: var(--radius-lg);" />
          <div class="card-body">
            <div class="card-title">番茄鸡蛋面</div>
            <span class="stars">
              <i data-lucide="star" class="star" style="width: 14px; height: 14px; fill: var(--accent);"></i>
              <i data-lucide="star" class="star" style="width: 14px; height: 14px; fill: var(--accent);"></i>
              <i data-lucide="star" class="star" style="width: 14px; height: 14px; fill: var(--accent);"></i>
              <i data-lucide="star" class="star" style="width: 14px; height: 14px; fill: var(--accent);"></i>
              <i data-lucide="star" class="star star--empty" style="width: 14px; height: 14px;"></i>
              <span class="rating-num" style="margin-left: 4px;">4.0</span>
            </span>
            <div class="card-tags">
              <span class="chip accent">早餐</span>
              <span class="chip filled">下厨日记</span>
            </div>
            <div class="card-time">今天 08:15</div>
          </div>
        </div>

        <!-- Card 3: 糖醋排骨 -->
        <div data-component="card" class="food-card food-card--h food-card--diary" style="width: 100%;">
          <img class="card-img" src="../assets/food-sweet-ribs.jpg" alt="糖醋排骨" style="width: 96px; height: 96px; flex-shrink: 0; object-fit: cover; border-radius: var(--radius-lg);" />
          <div class="card-body">
            <div class="card-title">糖醋排骨</div>
            <span class="stars">
              <i data-lucide="star" class="star" style="width: 14px; height: 14px; fill: var(--accent);"></i>
              <i data-lucide="star" class="star" style="width: 14px; height: 14px; fill: var(--accent);"></i>
              <i data-lucide="star" class="star" style="width: 14px; height: 14px; fill: var(--accent);"></i>
              <i data-lucide="star" class="star" style="width: 14px; height: 14px; fill: var(--accent);"></i>
              <i data-lucide="star" class="star star--empty" style="width: 14px; height: 14px;"></i>
              <span class="rating-num" style="margin-left: 4px;">4.0</span>
            </span>
            <div class="card-tags">
              <span class="chip accent">晚餐</span>
              <span class="chip filled">节日美食</span>
            </div>
            <div class="card-time">昨天 18:45</div>
          </div>
        </div>

      </div>

    </main>

    <!-- Bottom Navigation -->
    <nav data-component="bottom-nav" class="bottom-nav">
      <div class="nav-item active" data-dom-id="nav-home" data-nav-key="home" data-active="true">
        <i data-lucide="home" class="nav-icon" style="width: 20px; height: 20px;"></i>
        <span class="nav-label">首页</span>
      </div>
      <div class="nav-item" data-dom-id="nav-records" data-nav-key="records">
        <i data-lucide="book-open" class="nav-icon" style="width: 20px; height: 20px;"></i>
        <span class="nav-label">记录</span>
      </div>
      <div class="center-fab" data-dom-id="fab-camera" data-nav-key="camera">
        <i data-lucide="camera" class="center-fab-icon" style="width: 24px; height: 24px;"></i>
      </div>
      <div class="nav-item" data-dom-id="nav-family" data-nav-key="family">
        <i data-lucide="users" class="nav-icon" style="width: 20px; height: 20px;"></i>
        <span class="nav-label">家庭</span>
      </div>
      <div class="nav-item" data-dom-id="nav-profile" data-nav-key="profile">
        <i data-lucide="user" class="nav-icon" style="width: 20px; height: 20px;"></i>
        <span class="nav-label">我的</span>
      </div>
    </nav>

    <!-- Home Indicator -->
    <div style="height: 34px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; background: var(--background);">
      <div style="width: 134px; height: 5px; border-radius: 3px; background: var(--neutral-300);"></div>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
