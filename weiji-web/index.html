<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>味记 - 记录每一顿温暖</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Noto+Serif+SC:wght@600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

:root {
  --primary-50: #fff5f0;
  --primary-100: #ffe6d9;
  --primary-200: #ffc9a8;
  --primary-300: #ffa06e;
  --primary-400: #ff7a3d;
  --primary-500: #ff5e1a;
  --primary-600: #e64a10;
  --primary-700: #b83a0e;
  --primary-800: #8f2d0e;
  --primary-900: #6e230f;
  --primary: var(--primary-500);
  --primary-foreground: #ffffff;
  
  --accent-50: #fffbeb;
  --accent-100: #fff3c4;
  --accent-200: #ffe588;
  --accent-300: #ffd24a;
  --accent-400: #ffbe20;
  --accent-500: #f5a623;
  --accent-600: #d48a10;
  --accent-700: #a86b0d;
  --accent-800: #7d500f;
  --accent-900: #5c3c10;
  --accent: var(--accent-500);
  --accent-foreground: #ffffff;
  
  --success-50: #f0fdf4;
  --success-100: #dcfce7;
  --success-200: #bbf7d0;
  --success-300: #86efac;
  --success-400: #4ade80;
  --success-500: #22c55e;
  --success-600: #16a34a;
  --success-700: #15803d;
  --success-800: #166534;
  --success-900: #14532d;
  
  --warning-50: #fffbeb;
  --warning-100: #fef3c7;
  --warning-200: #fde68a;
  --warning-300: #fcd34d;
  --warning-400: #fbbf24;
  --warning-500: #f59e0b;
  --warning-600: #d97706;
  --warning-700: #b45309;
  --warning-800: #92400e;
  --warning-900: #78350f;
  
  --error-50: #fef2f2;
  --error-100: #fee2e2;
  --error-200: #fecaca;
  --error-300: #fca5a5;
  --error-400: #f87171;
  --error-500: #ef4444;
  --error-600: #dc2626;
  --error-700: #b91c1c;
  --error-800: #991b1b;
  --error-900: #7f1d1d;
  
  --info-50: #eff6ff;
  --info-100: #dbeafe;
  --info-200: #bfdbfe;
  --info-300: #93c5fd;
  --info-400: #60a5fa;
  --info-500: #3b82f6;
  --info-600: #2563eb;
  --info-700: #1d4ed8;
  --info-800: #1e40af;
  --info-900: #1e3a8a;
  
  --neutral-50: #faf8f5;
  --neutral-100: #f5f0e8;
  --neutral-200: #e8dfd2;
  --neutral-300: #d4c7b5;
  --neutral-400: #b8a694;
  --neutral-500: #9a8b7a;
  --neutral-600: #7d7064;
  --neutral-700: #635a50;
  --neutral-800: #4a443d;
  --neutral-900: #332f2a;
  
  --background: #fffaf5;
  --surface: #ffffff;
  --surface-dim: #f5f0e8;
  --surface-container-low: #faf7f2;
  --surface-container: #f5f0e8;
  --surface-container-high: #ebe4da;
  --surface-container-highest: #e0d7cb;
  --card: #ffffff;
  --popover: #ffffff;
  
  --foreground: #332f2a;
  --muted-foreground: #7d7064;
  --secondary-foreground: #4a443d;
  
  --border: #e8dfd2;
  --ring: var(--primary-500);
  
  --bg: var(--background);
  --fg: var(--foreground);
  --accent-hover: var(--primary-600);
  --rule: var(--border);
  --link: var(--primary-600);
  --muted: var(--neutral-100);
  --error: var(--error-500);
  --error-container: var(--error-100);
  --on-error: #ffffff;
  --on-error-container: var(--error-900);
  
  --font-display: 'Noto Serif SC', serif;
  --font-heading: 'Noto Serif SC', serif;
  --font-body: 'Noto Sans SC', sans-serif;
  
  --font-size-h3: 22px;
  --font-size-h4: 18px;
  --font-size-body: 15px;
  --font-size-lead: 17px;
  --font-size-caption: 12px;
  
  --font-weight-h3: 600;
  --font-weight-h4: 600;
  --font-weight-body: 400;
  
  --line-height-body: 1.6;
  
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 24px;
  --space-6: 32px;
  
  --size-icon-sm: 16px;
  --size-icon-md: 20px;
  --size-icon-lg: 24px;
  --size-button-sm: 32px;
  --size-button-md: 40px;
  --size-button-lg: 48px;
  --size-bottom-nav: 56px;
  
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --radius-full: 9999px;
  
  --shadow-1: 0 1px 3px rgba(51,47,42,.08), 0 1px 2px rgba(51,47,42,.04);
  --shadow-2: 0 4px 8px -2px rgba(51,47,42,.10);
  --shadow-3: 0 8px 24px -6px rgba(51,47,42,.14);
  --shadow-4: 0 16px 40px -10px rgba(51,47,42,.20);
  
  --color-background: var(--bg);
  --color-foreground: var(--fg);
  --color-surface: var(--surface);
  --color-card: var(--card);
  --color-on-surface: var(--fg);
  --color-on-surface-variant: var(--muted-foreground);
  --color-muted-foreground: var(--muted-foreground);
  --color-primary: var(--primary);
  --color-primary-hover: var(--accent-hover);
  --color-on-primary: var(--primary-foreground);
  --color-primary-container: var(--primary-50);
  --color-on-primary-container: var(--primary-900);
  --color-border: var(--rule);
  --color-success: var(--success-600);
  --color-outline: var(--rule);
  --color-surface-container-high: var(--surface-container-high);
}

body {
    font-family: var(--font-body);
    background: var(--background);
    color: var(--foreground);
    min-height: 100vh;
    line-height: var(--line-height-body);
    -webkit-font-smoothing: antialiased;
}

.app-container {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    background: var(--background);
    position: relative;
}

.status-bar {
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    font-size: var(--font-size-caption);
    font-weight: 600;
    color: var(--color-on-surface);
    background: var(--background);
    flex-shrink: 0;
}

.status-bar-icons {
    display: flex;
    align-items: center;
    gap: 6px;
}

.page-wrapper {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    position: relative;
}

.page {
    display: none;
    animation: fadeIn 0.3s ease;
}

.page.active {
    display: block;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
}

.bottom-nav {
    display: flex;
    align-items: flex-end;
    justify-content: space-around;
    width: 100%;
    height: var(--size-bottom-nav);
    background: var(--color-card);
    border-top: 1px solid var(--color-border);
    padding: 0 var(--space-2);
    padding-bottom: var(--space-2);
    position: relative;
    flex-shrink: 0;
}

.nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    flex: 1;
    cursor: pointer;
    transition: all .15s;
    color: var(--color-muted-foreground);
    text-decoration: none;
    border-radius: var(--radius-sm);
    padding: var(--space-1);
    background: none;
    border: none;
}

.nav-item:hover {
    background: var(--surface-container-low);
}

.nav-item.active {
    color: var(--color-primary);
}

.nav-item.active .nav-label {
    font-weight: 600;
}

.nav-icon {
    width: var(--size-icon-md);
    height: var(--size-icon-md);
    flex-shrink: 0;
}

.nav-label {
    font-size: var(--font-size-caption);
    line-height: 1;
    white-space: nowrap;
}

.center-fab {
    width: 44px;
    height: 44px;
    border-radius: var(--radius-full);
    background: var(--color-primary);
    color: var(--color-on-primary);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: var(--shadow-2);
    cursor: pointer;
    flex-shrink: 0;
    margin-top: -16px;
    border: 3px solid var(--color-card);
    transition: all .15s;
    border: none;
}

.center-fab:hover {
    background: var(--color-primary-hover);
    transform: scale(1.05);
}

.center-fab:active {
    transform: scale(0.95);
}

.center-fab-icon {
    width: var(--size-icon-lg);
    height: var(--size-icon-lg);
}

.home-indicator {
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    background: var(--background);
}

.home-indicator-bar {
    width: 134px;
    height: 5px;
    border-radius: 3px;
    background: var(--neutral-300);
}

.btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border: none;
    cursor: pointer;
    font-family: var(--font-body);
    font-weight: var(--font-weight-body);
    white-space: nowrap;
    flex-shrink: 0;
    transition: all .15s;
}

.btn:focus-visible {
    outline: 2px solid var(--ring);
    outline-offset: 2px;
}

.btn-primary {
    background: var(--color-primary);
    color: var(--color-on-primary);
    border-radius: var(--radius-lg);
    padding: var(--space-3) var(--space-6);
    font-size: var(--font-size-body);
    height: var(--size-button-md);
}

.btn-primary:hover {
    background: var(--accent-hover);
}

.btn-primary:active {
    filter: brightness(0.92);
    transform: scale(0.98);
}

.btn-secondary {
    background: var(--accent);
    color: var(--accent-foreground);
    border-radius: var(--radius-lg);
    padding: var(--space-3) var(--space-6);
    font-size: var(--font-size-body);
    height: var(--size-button-md);
}

.btn-secondary:hover {
    filter: brightness(1.08);
}

.btn-outline {
    background: transparent;
    color: var(--color-primary);
    border: 1.5px solid var(--color-primary);
    border-radius: var(--radius-lg);
    padding: var(--space-3) var(--space-6);
    font-size: var(--font-size-body);
    height: var(--size-button-md);
}

.btn-outline:hover {
    background: var(--color-primary-container);
}

.btn-ghost {
    background: transparent;
    color: var(--color-on-surface-variant);
    border-radius: var(--radius-md);
    padding: var(--space-1) var(--space-3);
    font-size: var(--font-size-caption);
    height: var(--size-button-sm);
}

.btn-ghost:hover {
    background: var(--surface-container);
}

.btn-sm {
    height: var(--size-button-sm);
    padding: var(--space-1) var(--space-3);
    font-size: var(--font-size-caption);
}

.btn-lg {
    height: var(--size-button-lg);
    padding: var(--space-4) var(--space-6);
    font-size: var(--font-size-lead);
}

.avatar {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: var(--radius-full);
    overflow: hidden;
    flex-shrink: 0;
}

.avatar-sm { width: 24px; height: 24px; }
.avatar-md { width: 40px; height: 40px; }
.avatar-lg { width: 72px; height: 72px; }

.avatar-initials {
    font-family: var(--font-body);
    font-weight: 600;
    pointer-events: none;
    user-select: none;
    white-space: nowrap;
}

.avatar-sm .avatar-initials { font-size: 10px; }
.avatar-md .avatar-initials { font-size: 14px; }
.avatar-lg .avatar-initials { font-size: 22px; }

.avatar-badge {
    position: absolute;
    border-radius: var(--radius-full);
    border: 2px solid var(--color-card);
}

.avatar-online {
    width: 10px;
    height: 10px;
    background: var(--success-500);
    bottom: 0;
    right: 0;
}

.avatar-role {
    width: 14px;
    height: 14px;
    background: var(--warning-500);
    bottom: 0;
    right: 0;
    display: flex;
    align-items: center;
    justify-content: center;
}

.avatar-profile {
    border: 3px solid var(--color-card);
    box-shadow: var(--shadow-2);
}

.input-search {
    display: flex;
    align-items: center;
    gap: var(--space-2);
    height: var(--size-button-md);
    background: var(--muted);
    border: 1.5px solid transparent;
    border-radius: var(--radius-xl);
    padding: 0 var(--space-3);
    flex: 1;
    min-width: 200px;
    transition: border-color .15s;
}

.input-search:focus-within {
    border-color: var(--color-primary);
}

.input-search input {
    border: none;
    background: transparent;
    outline: none;
    flex: 1;
    font-size: var(--font-size-body);
    font-family: var(--font-body);
    color: var(--color-on-surface);
    min-width: 0;
}

.input-search input::placeholder {
    color: var(--color-muted-foreground);
}

.input-search .ico {
    flex-shrink: 0;
    color: var(--color-on-surface-variant);
    display: flex;
    align-items: center;
}

.chip {
    display: inline-flex;
    align-items: center;
    gap: var(--space-1);
    border-radius: var(--radius-full);
    white-space: nowrap;
    cursor: pointer;
    transition: all .15s;
    font-family: var(--font-body);
    flex-shrink: 0;
    border: none;
    padding: var(--space-1) var(--space-3);
    font-size: var(--font-size-caption);
    font-weight: 500;
}

.chip.filled {
    background: var(--color-primary-container);
    color: var(--color-primary);
}

.chip.filled:hover {
    filter: brightness(0.95);
}

.chip.outline {
    background: transparent;
    color: var(--color-on-surface-variant);
    border: 1px solid var(--color-border);
}

.chip.outline:hover, .chip.outline.selected {
    background: var(--color-primary-container);
    color: var(--color-primary);
    border-color: var(--color-primary);
}

.chip.accent {
    background: var(--accent-50);
    color: var(--accent);
    padding: 2px var(--space-2);
    font-size: 11px;
}

.chip.selected {
    background: var(--color-primary);
    color: var(--color-on-primary);
}

.food-card {
    background: var(--color-card);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow-2);
    overflow: hidden;
    transition: all .15s;
    flex-shrink: 0;
    cursor: pointer;
}

.food-card:hover {
    box-shadow: var(--shadow-3);
    transform: translateY(-2px);
}

.food-card:active {
    transform: translateY(0);
}

.food-card--h {
    display: flex;
    padding: var(--space-4);
    gap: var(--space-3);
}

.food-card--diary .card-img {
    border-radius: var(--radius-lg);
}

.food-card--h .card-img {
    width: 96px;
    height: 96px;
    flex-shrink: 0;
    object-fit: cover;
}

.food-card--h .card-body {
    display: flex;
    flex-direction: column;
    gap: var(--space-1);
    min-width: 0;
    flex: 1;
}

.card-title {
    font-size: var(--font-size-body);
    font-weight: var(--font-weight-h4);
    color: var(--color-on-surface);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.card-tags {
    display: flex;
    gap: var(--space-1);
    flex-wrap: wrap;
}

.card-time {
    font-size: var(--font-size-caption);
    color: var(--color-on-surface-variant);
    margin-top: auto;
}

.food-card--v {
    width: 100%;
}

.food-card--v .card-img {
    width: 100%;
    height: 140px;
    object-fit: cover;
}

.food-card--v .card-body {
    padding: var(--space-4);
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
}

.tag {
    display: inline-flex;
    align-items: center;
    padding: 2px var(--space-2);
    border-radius: var(--radius-full);
    font-size: var(--font-size-caption);
    background: var(--surface-container-high);
    color: var(--color-on-surface-variant);
    white-space: nowrap;
}

.tag--accent {
    background: var(--color-primary-container);
    color: var(--color-on-primary-container);
}

.stars {
    display: inline-flex;
    gap: 2px;
    align-items: center;
}

.star {
    width: 14px;
    height: 14px;
    color: var(--accent);
    cursor: pointer;
    transition: transform .1s;
}

.star:hover {
    transform: scale(1.2);
}

.star--empty {
    color: var(--neutral-300);
    fill: none !important;
}

.rating-num {
    font-size: var(--font-size-caption);
    color: var(--color-on-surface-variant);
    margin-left: 4px;
}

.badge {
    display: inline-flex;
    align-items: center;
    padding: 2px var(--space-2);
    border-radius: var(--radius-full);
    font-size: var(--font-size-caption);
    font-weight: 600;
    background: var(--color-success);
    color: #fff;
    white-space: nowrap;
}

.page-header {
    padding: var(--space-4) var(--space-5) var(--space-3);
    background: var(--background);
    flex-shrink: 0;
}

.page-header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.page-title {
    font-family: var(--font-heading);
    font-size: var(--font-size-h3);
    font-weight: var(--font-weight-h3);
    color: var(--color-on-surface);
}

.page-subtitle {
    font-size: var(--font-size-caption);
    color: var(--color-on-surface-variant);
    margin-top: 2px;
}

.section-title {
    font-family: var(--font-heading);
    font-size: var(--font-size-h4);
    font-weight: var(--font-weight-h4);
    color: var(--color-on-surface);
    padding: var(--space-4) var(--space-5) var(--space-2);
}

.padding-x {
    padding-left: var(--space-5);
    padding-right: var(--space-5);
}

.padding-bottom {
    padding-bottom: var(--space-4);
}

.no-scrollbar::-webkit-scrollbar { display: none; }
.no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

.chips-scroll {
    display: flex;
    gap: var(--space-2);
    padding: var(--space-2) var(--space-5);
    overflow-x: auto;
    flex-shrink: 0;
}

.card-white {
    background: var(--color-card);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow-1);
}

.checkin-card {
    padding: var(--space-4);
    margin: 0 var(--space-5) var(--space-3);
}

.checkin-days {
    display: flex;
    gap: var(--space-1);
    margin-top: var(--space-3);
}

.checkin-day {
    width: 32px;
    height: 32px;
    border-radius: var(--radius-full);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: var(--font-size-caption);
    font-weight: 500;
    transition: all .2s;
    cursor: pointer;
}

.checkin-day.done {
    background: var(--color-primary);
    color: var(--color-on-primary);
}

.checkin-day.today {
    background: var(--color-primary-container);
    color: var(--color-on-primary-container);
    border: 1.5px solid var(--color-primary);
}

.checkin-day.future {
    background: var(--surface-container-high);
    color: var(--color-on-surface-variant);
}

.food-list {
    padding: 0 var(--space-5) var(--space-4);
    display: flex;
    flex-direction: column;
    gap: var(--space-3);
}

.tabs-bar {
    display: flex;
    gap: var(--space-4);
    padding: var(--space-3) var(--space-5);
    border-bottom: 1px solid var(--color-border);
    flex-shrink: 0;
    background: var(--background);
}

.tab-item {
    font-size: var(--font-size-body);
    cursor: pointer;
    padding-bottom: var(--space-2);
    border-bottom: 2px solid transparent;
    transition: all .15s;
    white-space: nowrap;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
    color: var(--color-on-surface-variant);
}

.tab-item.active {
    color: var(--color-primary);
    border-bottom-color: var(--color-primary);
    font-weight: 600;
}

.family-members {
    display: flex;
    gap: var(--space-4);
    overflow-x: auto;
    padding-bottom: var(--space-2);
}

.family-member {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: var(--space-1);
    flex-shrink: 0;
    cursor: pointer;
    transition: transform .15s;
}

.family-member:hover {
    transform: scale(1.05);
}

.recipe-grid {

                <div class="section-title">美食挑战</div>
                <div class="challenge-list" id="challenge-list"></div>

                <div style="padding: 0 var(--space-5) var(--space-6);">
                    <button class="btn btn-primary btn-lg" style="width: 100%; font-weight: 500;" onclick="showToast('挑战功能即将上线！')">
                        <i data-lucide="plus" style="width: 18px; height: 18px; margin-right: 6px;"></i>
                        参与挑战
                    </button>
                </div>
            </div>

            <div id="page-profile" class="page">
                <div class="profile-header">
                    <div class="avatar avatar-lg avatar-profile" id="profile-avatar" style="background: var(--primary-100); cursor: pointer;" onclick="showToast('头像设置')">
                        <span class="avatar-initials" style="color: var(--primary-700);"></span>
                    </div>
                    <div style="margin-top: var(--space-3); text-align: center;">
                        <div id="profile-name" style="font-family: var(--font-heading); font-size: var(--font-size-h4); font-weight: 600; color: var(--color-on-surface);"></div>
                        <div class="caption" id="profile-bio" style="color: var(--color-on-surface-variant); margin-top: 2px;"></div>
                    </div>

                    <div class="profile-stats">
                        <div class="profile-stat" onclick="navigateTo('home')">
                            <div class="profile-stat-num" id="profile-stat-records">--</div>
                            <div class="profile-stat-label">美食记录</div>
                        </div>
                        <div class="profile-stat" onclick="navigateTo('family')">
                            <div class="profile-stat-num" id="profile-stat-recipes">--</div>
                            <div class="profile-stat-label">家庭菜谱</div>
                        </div>
                        <div class="profile-stat" onclick="navigateTo('achievements')">
                            <div class="profile-stat-num" id="profile-stat-streak">--</div>
                            <div class="profile-stat-label">连续打卡</div>
                        </div>
                    </div>
                </div>

                <div style="padding: var(--space-4) var(--space-5) var(--space-2);">
                    <div style="display: flex; gap: var(--space-3);">
                        <button class="btn btn-primary" style="flex: 1;" onclick="navigateTo('records')">
                            <i data-lucide="camera" style="width: 18px; height: 18px; margin-right: 6px;"></i>
                            记录美食
                        </button>
                        <button class="btn btn-outline" style="flex: 1;" onclick="navigateTo('family')">
                            <i data-lucide="book-open" style="width: 18px; height: 18px; margin-right: 6px;"></i>
                            编辑菜谱
                        </button>
                    </div>
                </div>

                <div style="padding: 0 var(--space-5) var(--space-4);">
                    <div style="display: flex; gap: var(--space-3);">
                        <button class="btn btn-secondary" style="flex: 1;" onclick="showToast('邀请家人')">
                            <i data-lucide="users" style="width: 18px; height: 18px; margin-right: 6px;"></i>
                            邀请家人
                        </button>
                        <button class="btn btn-ghost" style="flex: 1; background: var(--surface-container-low);" onclick="navigateTo('achievements')">
                            <i data-lucide="trophy" style="width: 18px; height: 18px; margin-right: 6px;"></i>
                            成就徽章
                        </button>
                    </div>
                </div>

                <div class="section-title">我的功能</div>
                <div style="padding: 0 var(--space-5) var(--space-6);">
                    <div class="menu-item" onclick="navigateTo('home')">
                        <i data-lucide="book-open" style="width: var(--size-icon-md); height: var(--size-icon-md); color: var(--color-on-surface-variant); flex-shrink: 0;"></i>
                        <span style="flex: 1; font-size: var(--font-size-body); color: var(--color-on-surface); min-width: 0;">我的日记</span>
                        <i data-lucide="chevron-right" style="width: var(--size-icon-sm); height: var(--size-icon-sm); color: var(--neutral-400); flex-shrink: 0;"></i>
                    </div>

                    <div class="menu-item" onclick="navigateTo('family')">
                        <i data-lucide="users" style="width: var(--size-icon-md); height: var(--size-icon-md); color: var(--color-on-surface-variant); flex-shrink: 0;"></i>
                        <span style="flex: 1; font-size: var(--font-size-body); color: var(--color-on-surface); min-width: 0;">家庭菜谱</span>
                        <i data-lucide="chevron-right" style="width: var(--size-icon-sm); height: var(--size-icon-sm); color: var(--neutral-400); flex-shrink: 0;"></i>
                    </div>

                    <div class="menu-item" onclick="showToast('购物清单功能')">
                        <i data-lucide="shopping-cart" style="width: var(--size-icon-md); height: var(--size-icon-md); color: var(--color-on-surface-variant); flex-shrink: 0;"></i>
                        <span style="flex: 1; font-size: var(--font-size-body); color: var(--color-on-surface); min-width: 0;">购物清单</span>
                        <i data-lucide="chevron-right" style="width: var(--size-icon-sm); height: var(--size-icon-sm); color: var(--neutral-400); flex-shrink: 0;"></i>
                    </div>

                    <div class="menu-item" onclick="navigateTo('achievements')">
                        <i data-lucide="trophy" style="width: var(--size-icon-md); height: var(--size-icon-md); color: var(--color-on-surface-variant); flex-shrink: 0;"></i>
                        <span style="flex: 1; font-size: var(--font-size-body); color: var(--color-on-surface); min-width: 0;">成就徽章</span>
                        <i data-lucide="chevron-right" style="width: var(--size-icon-sm); height: var(--size-icon-sm); color: var(--neutral-400); flex-shrink: 0;"></i>
                    </div>

                    <div class="menu-item" onclick="showToast('推荐菜谱功能')">
                        <i data-lucide="sparkles" style="width: var(--size-icon-md); height: var(--size-icon-md); color: var(--color-on-surface-variant); flex-shrink: 0;"></i>
                        <span style="flex: 1; font-size: var(--font-size-body); color: var(--color-on-surface); min-width: 0;">推荐菜谱</span>
                        <i data-lucide="chevron-right" style="width: var(--size-icon-sm); height: var(--size-icon-sm); color: var(--neutral-400); flex-shrink: 0;"></i>
                    </div>

                    <div class="menu-item" onclick="showToast('设置功能')">
                        <i data-lucide="settings" style="width: var(--size-icon-md); height: var(--size-icon-md); color: var(--color-on-surface-variant); flex-shrink: 0;"></i>
                        <span style="flex: 1; font-size: var(--font-size-body); color: var(--color-on-surface); min-width: 0;">设置</span>
                        <i data-lucide="chevron-right" style="width: var(--size-icon-sm); height: var(--size-icon-sm); color: var(--neutral-400); flex-shrink: 0;"></i>
                    </div>
                </div>
            </div>
        </div>

        <nav class="bottom-nav">
            <button class="nav-item active" data-page="home" onclick="navigateTo('home')">
                <i data-lucide="home" class="nav-icon"></i>
                <span class="nav-label">首页</span>
            </button>
            <button class="nav-item" data-page="records" onclick="navigateTo('records')">
                <i data-lucide="book-open" class="nav-icon"></i>
                <span class="nav-label">记录</span>
            </button>
            <button class="center-fab" onclick="navigateTo('records')">
                <i data-lucide="camera" class="center-fab-icon"></i>
            </button>
            <button class="nav-item" data-page="family" onclick="navigateTo('family')">
                <i data-lucide="users" class="nav-icon"></i>
                <span class="nav-label">家庭</span>
            </button>
            <button class="nav-item" data-page="profile" onclick="navigateTo('profile')">
                <i data-lucide="user" class="nav-icon"></i>
                <span class="nav-label">我的</span>
            </button>
        </nav>

        <div class="home-indicator">
            <div class="home-indicator-bar"></div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="api.js"></script>
    <script src="app.js"></script>
</body>
</html>
